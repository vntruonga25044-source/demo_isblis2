<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dự án Demo Nhóm</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; padding: 20px; }
        .container { max-width: 800px; margin: auto; border: 1px solid #ccc; padding: 20px; }
        header { background: #f4f4f4; padding: 10px; margin-bottom: 20px; text-align: center; }
        footer { margin-top: 20px; font-size: 0.8em; color: #666; border-top: 1px solid #eee; }
    </style>
</head>
<body>
    <div class="container">
        <header id="main-header">
            <h1>Chào mừng đến với Dự án lớp học</h1>
        </header>

        <section>
            <h2>Danh sách thành viên:</h2>
            <ul>
                <li>Thành viên A - Trưởng nhóm</li>
                <li>Thành viên B - Thành viên</li>
            </ul>
        </section>

        <footer id="main-footer">
            <p>&copy; 2023 GitHub Tutorial</p>
        </footer>
    </div>
</body>
</html>
